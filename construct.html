<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONSTRUCT 3.14 — Бионические конструкции</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Unbounded:wght@200;300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#080808;--border:#1a1a1a;--border2:#272727;--accent:#c9a96e;--accent2:#e8c880;--text:#ede8df;--text2:#9a8e80;--text3:#3e3830;--white:#f5f0e8;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Jost',sans-serif;font-weight:300;overflow:hidden;height:100vh;}
a,a:visited{color:inherit;text-decoration:none;}

.nav-back{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text2);transition:color .3s;}
.nav-back:hover{color:var(--accent);}

.page{height:100vh;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.bg{position:absolute;inset:0;background:url('assets/images/construct-bg.jpg') center/cover no-repeat;filter:brightness(.3) saturate(.6);}
.overlay{position:absolute;inset:0;background:rgba(8,8,8,.5);}

.content{position:relative;z-index:2;text-align:center;padding:48px;}
.label{font-size:11px;letter-spacing:6px;text-transform:uppercase;color:var(--accent);margin-bottom:24px;animation:up .8s .2s both;}
.title{font-family:'Cormorant Garamond',serif;font-size:clamp(48px,7vw,96px);font-weight:300;color:var(--white);line-height:1;margin-bottom:32px;animation:up .8s .4s both;}
.title em{font-style:italic;color:var(--accent);}
.sub{font-size:14px;line-height:1.9;color:var(--text2);max-width:480px;margin:0 auto 48px;animation:up .8s .6s both;}
.pulse{width:48px;height:1px;background:var(--accent);margin:0 auto;animation:pulse 2s infinite;}

.back-btn{display:inline-flex;align-items:center;gap:10px;border:1px solid var(--border2);color:var(--text2);font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:14px 24px;margin-top:40px;transition:border-color .3s,color .3s;animation:up .8s .8s both;}
.back-btn:hover{border-color:var(--accent);color:var(--accent);}

@keyframes up{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse{0%,100%{opacity:.2;transform:scaleX(.3);}50%{opacity:1;transform:scaleX(1);}}

@media(max-width:768px){.content{padding:24px;}}
</style>
</head>
<body>
<script src="nav.js"></script>

<div class="page">
  <div class="bg"></div>
  <div class="overlay"></div>
  <div class="content">
    <div class="label">CONSTRUCT 3.14</div>
    <h1 class="title">Бионические<br><em>конструкции.</em></h1>
    <p class="sub">Сложные конструктивные решения для партнёров. Нестандартные формы, параметрические фасады, уникальные несущие системы. Раздел в разработке — скоро появится.</p>
    <div class="pulse"></div>
    <a href="index.html" class="back-btn">← Вернуться на главную</a>
  </div>
</div>
</body>
</html>
